<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Art Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to My AI Art Gallery</h1>
        <p>Explore stunning artworks curated just for you!</p>
    </header>

    <nav>
        <a href="#gallery">Gallery</a>
        <a href="#about">About</a>
        <a href="#feedback">Feedback</a>
    </nav>

    <main>
        <section id="gallery">
            <div class="gallery-container">
                <img src="https://picsum.photos/seed/1/400/300" alt="Art 1">
                <img src="https://picsum.photos/seed/2/400/300" alt="Art 2">
                <img src="https://picsum.photos/seed/3/400/300" alt="Art 3">
                <img src="https://picsum.photos/seed/4/400/300" alt="Art 4">
                <img src="https://picsum.photos/seed/5/400/300" alt="Art 5">
                <img src="https://picsum.photos/seed/6/400/300" alt="Art 6">
            </div>
        </section>

        <section id="about">
            <h2>About Me</h2>
            <p>Hi, I am Syed Muhammad Hassan, a passionate artist sharing my creations with the world.</p>
        </section>

        <section id="feedback">
            <form>
                <label>Name</label>
                <input type="text" placeholder="Enter your name">

                <label>Email</label>
                <input type="email" placeholder="Enter your email">

                <label>Your Feedback</label>
                <textarea placeholder="Enter your feedback"></textarea>

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 AI Art Gallery</p>
    </footer>
</body>
</html>
