<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Editor - 23i-0519</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🎨 Image Filter Editor</h1>
            <p>Roll Number: 23i-0519 (Step: 3)</p>
        </header>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Left Panel - Filters -->
            <div class="left-panel">
                <div class="filters-section">
                    <h3>Filters</h3>
                    
                    <!-- Filter Tab Buttons -->
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="brightness">Brightness</button>
                        <button class="filter-tab" data-filter="saturation">Saturation</button>
                        <button class="filter-tab" data-filter="inversion">Inversion</button>
                        <button class="filter-tab" data-filter="grayscale">Grayscale</button>
                    </div>

                    <!-- Slider Container -->
                    <div class="slider-container">
                        <div class="slider-item active" id="brightness-slider">
                            <div class="slider-header">
                                <span>Brightness</span>
                                <span class="slider-value" id="brightness-value">100%</span>
                            </div>
                            <input type="range" id="brightness" min="0" max="200" value="100" step="3">
                        </div>

                        <div class="slider-item" id="saturation-slider">
                            <div class="slider-header">
                                <span>Saturation</span>
                                <span class="slider-value" id="saturation-value">100%</span>
                            </div>
                            <input type="range" id="saturation" min="0" max="200" value="100" step="3">
                        </div>

                        <div class="slider-item" id="inversion-slider">
                            <div class="slider-header">
                                <span>Inversion</span>
                                <span class="slider-value" id="inversion-value">0%</span>
                            </div>
                            <input type="range" id="inversion" min="0" max="100" value="0" step="3">
                        </div>

                        <div class="slider-item" id="grayscale-slider">
                            <div class="slider-header">
                                <span>Grayscale</span>
                                <span class="slider-value" id="grayscale-value">0%</span>
                            </div>
                            <input type="range" id="grayscale" min="0" max="100" value="0" step="3">
                        </div>
                    </div>

                    <!-- Additional Filters -->
                    <div class="additional-filters">
                        <h4>More Filters</h4>
                        
                        <div class="slider-item">
                            <div class="slider-header">
                                <span>Sepia</span>
                                <span class="slider-value" id="sepia-value">0%</span>
                            </div>
                            <input type="range" id="sepia" min="0" max="100" value="0" step="3">
                        </div>

                        <div class="slider-item">
                            <div class="slider-header">
                                <span>Blur</span>
                                <span class="slider-value" id="blur-value">0px</span>
                            </div>
                            <input type="range" id="blur" min="0" max="30" value="0" step="3">
                        </div>

                        <div class="slider-item">
                            <div class="slider-header">
                                <span>Rotate</span>
                                <span class="slider-value" id="rotate-value">0°</span>
                            </div>
                            <input type="range" id="rotate" min="0" max="360" value="0" step="3">
                        </div>
                    </div>

                    <!-- Rotate & Flip Buttons -->
                    <div class="rotate-flip-section">
                        <h4>Rotate & Flip</h4>
                        <div class="rotate-flip-buttons">
                            <button class="icon-btn" id="rotate-left" title="Rotate Left 90°">
                                <span>↶</span>
                            </button>
                            <button class="icon-btn" id="rotate-right" title="Rotate Right 90°">
                                <span>↷</span>
                            </button>
                            <button class="icon-btn" id="flip-horizontal" title="Flip Horizontal">
                                <span>⇄</span>
                            </button>
                            <button class="icon-btn" id="flip-vertical" title="Flip Vertical">
                                <span>⇅</span>
                            </button>
                        </div>
                    </div>

                    <!-- Undo/Redo Buttons -->
                    <div class="undo-redo-section">
                        <h4>Actions</h4>
                        <div class="undo-redo-buttons">
                            <button class="action-btn" id="undo-btn" disabled>
                                <span>↶</span> Undo
                            </button>
                            <button class="action-btn" id="redo-btn" disabled>
                                <span>↷</span> Redo
                            </button>
                        </div>
                    </div>

                    <!-- Reset Button -->
                    <button class="reset-btn" id="reset-btn">RESET FILTERS</button>
                </div>

                <!-- History Panel -->
                <div class="history-section">
                    <h3>History Panel</h3>
                    <div class="history-list" id="history-list">
                        <p class="no-history">No changes yet</p>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Canvas -->
            <div class="right-panel">
                <div class="canvas-container">
                    <div class="canvas-wrapper" id="canvas-wrapper">
                        <!-- Placeholder -->
                        <div class="placeholder" id="placeholder">
                            <svg class="placeholder-icon" viewBox="0 0 24 24">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <p>No image selected</p>
                            <p class="placeholder-hint">Click "Choose Image" to start editing</p>
                        </div>
                        <!-- Canvas -->
                        <canvas id="canvas"></canvas>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <input type="file" id="file-input" accept="image/*" hidden>
                    <button class="btn btn-secondary" id="choose-btn">CHOOSE IMAGE</button>
                    <button class="btn btn-primary" id="save-btn" disabled>SAVE IMAGE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
